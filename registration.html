<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #666;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        input::placeholder {
            color: #aaa;
        }

        .input-icon {
            position: relative;
        }

        .input-icon input {
            padding-left: 2.5rem;
        }

        .input-icon span {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .password-toggle {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            color: #667eea;
        }

        .form-group.password-group {
            position: relative;
        }

        .form-group.password-group input {
            padding-right: 2.5rem;
        }

        .strength-meter {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .strength-weak {
            background: #e74c3c;
            width: 33%;
        }

        .strength-medium {
            background: #f39c12;
            width: 66%;
        }

        .strength-strong {
            background: #27ae60;
            width: 100%;
        }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            font-weight: 600;
        }

        .strength-weak-text {
            color: #e74c3c;
        }

        .strength-medium-text {
            color: #f39c12;
        }

        .strength-strong-text {
            color: #27ae60;
        }

        .terms {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .terms input {
            width: auto;
            margin-right: 0.5rem;
            cursor: pointer;
        }

        .terms label {
            display: inline;
            font-weight: normal;
            margin: 0;
            cursor: pointer;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.95rem;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideIn 0.5s ease;
        }

        .success.show {
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .back-link span {
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="ai.html" class="back-link"><span>←</span> Back</a>

        <div class="header">
            <div class="logo">🤖</div>
            <h1>Create Account</h1>
            <p class="subtitle">Join AI Hub and unlock the power of AI</p>
        </div>

        <div class="success" id="successMessage">
            ✓ Registration successful! Redirecting...
        </div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-icon">
                    <span>✉️</span>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required
                    >
                </div>
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="input-icon">
                    <span>📱</span>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="+1 (123) 456-7890"
                        required
                    >
                </div>
                <div class="error" id="phoneError"></div>
            </div>

            <div class="form-group password-group">
                <label for="passcode">Passcode</label>
                <div class="input-icon">
                    <span>🔐</span>
                    <input 
                        type="password" 
                        id="passcode" 
                        name="passcode" 
                        placeholder="Enter a strong passcode"
                        required
                    >
                    <span class="password-toggle" onclick="togglePassword()">👁️</span>
                </div>
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
                <div class="error" id="passcodeError"></div>
            </div>

            <div class="form-group password-group">
                <label for="confirmPasscode">Confirm Passcode</label>
                <div class="input-icon">
                    <span>🔐</span>
                    <input 
                        type="password" 
                        id="confirmPasscode" 
                        name="confirmPasscode" 
                        placeholder="Re-enter your passcode"
                        required
                    >
                    <span class="password-toggle" onclick="toggleConfirmPassword()">👁️</span>
                </div>
                <div class="error" id="confirmError"></div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
                <div class="error" id="termsError"></div>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const passcodeInput = document.getElementById('passcode');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const successMessage = document.getElementById('successMessage');

        // Email validation
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Phone validation
        function validatePhone(phone) {
            const phoneRegex = /^[\d\s\-\+\(\)]{7,}$/;
            return phoneRegex.test(phone.replace(/\s/g, ''));
        }

        // Passcode strength check
        function checkPasscodeStrength(passcode) {
            let strength = 0;

            if (passcode.length >= 8) strength++;
            if (passcode.length >= 12) strength++;
            if (/[a-z]/.test(passcode)) strength++;
            if (/[A-Z]/.test(passcode)) strength++;
            if (/[0-9]/.test(passcode)) strength++;
            if (/[^a-zA-Z0-9]/.test(passcode)) strength++;

            return strength;
        }

        // Update passcode strength indicator
        passcodeInput.addEventListener('input', function() {
            const strength = checkPasscodeStrength(this.value);
            const strengthBarElement = document.getElementById('strengthBar');
            const strengthTextElement = document.getElementById('strengthText');

            strengthBarElement.className = 'strength-bar';
            strengthTextElement.className = 'strength-text';

            if (this.value.length === 0) {
                strengthBarElement.style.width = '0%';
                strengthTextElement.textContent = '';
            } else if (strength <= 2) {
                strengthBarElement.classList.add('strength-weak');
                strengthTextElement.classList.add('strength-weak-text');
                strengthTextElement.textContent = 'Weak passcode';
            } else if (strength <= 4) {
                strengthBarElement.classList.add('strength-medium');
                strengthTextElement.classList.add('strength-medium-text');
                strengthTextElement.textContent = 'Medium passcode';
            } else {
                strengthBarElement.classList.add('strength-strong');
                strengthTextElement.classList.add('strength-strong-text');
                strengthTextElement.textContent = 'Strong passcode';
            }
        });

        // Toggle password visibility
        function togglePassword() {
            const input = document.getElementById('passcode');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function toggleConfirmPassword() {
            const input = document.getElementById('confirmPasscode');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Clear error message
        function clearError(elementId) {
            const errorElement = document.getElementById(elementId);
            errorElement.classList.remove('show');
            errorElement.textContent = '';
        }

        // Show error message
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Clear all errors
            document.querySelectorAll('.error').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });

            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const passcode = document.getElementById('passcode').value;
            const confirmPasscode = document.getElementById('confirmPasscode').value;
            const termsCheckbox = document.getElementById('terms');

            let isValid = true;

            // Validate email
            if (!email) {
                showError('emailError', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('emailError', 'Please enter a valid email address');
                isValid = false;
            }

            // Validate phone
            if (!phone) {
                showError('phoneError', 'Phone number is required');
                isValid = false;
            } else if (!validatePhone(phone)) {
                showError('phoneError', 'Please enter a valid phone number');
                isValid = false;
            }

            // Validate passcode
            if (!passcode) {
                showError('passcodeError', 'Passcode is required');
                isValid = false;
            } else if (passcode.length < 8) {
                showError('passcodeError', 'Passcode must be at least 8 characters long');
                isValid = false;
            } else if (checkPasscodeStrength(passcode) <= 2) {
                showError('passcodeError', 'Passcode is too weak. Include uppercase, lowercase, numbers, and symbols');
                isValid = false;
            }

            // Validate passcode confirmation
            if (!confirmPasscode) {
                showError('confirmError', 'Please confirm your passcode');
                isValid = false;
            } else if (passcode !== confirmPasscode) {
                showError('confirmError', 'Passcodes do not match');
                isValid = false;
            }

            // Validate terms acceptance
            if (!termsCheckbox.checked) {
                showError('termsError', 'You must accept the terms and privacy policy');
                isValid = false;
            }

            // If valid, show success
            if (isValid) {
                const userData = {
                    email: email,
                    phone: phone,
                    passcode: passcode,
                    registeredAt: new Date().toLocaleString()
                };

                // Store in localStorage
                localStorage.setItem('userRegistration', JSON.stringify(userData));

                // Show success message
                successMessage.classList.add('show');

                // Reset form
                form.reset();
                document.getElementById('strengthBar').style.width = '0%';
                document.getElementById('strengthText').textContent = '';

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'ai.html';
                }, 2000);
            }
        });

        // Real-time validation on input
        document.getElementById('email').addEventListener('blur', function() {
            if (this.value && !validateEmail(this.value)) {
                showError('emailError', 'Please enter a valid email address');
            } else {
                clearError('emailError');
            }
        });

        document.getElementById('phone').addEventListener('blur', function() {
            if (this.value && !validatePhone(this.value)) {
                showError('phoneError', 'Please enter a valid phone number');
            } else {
                clearError('phoneError');
            }
        });

        document.getElementById('confirmPasscode').addEventListener('blur', function() {
            const passcode = document.getElementById('passcode').value;
            if (this.value && passcode !== this.value) {
                showError('confirmError', 'Passcodes do not match');
            } else {
                clearError('confirmError');
            }
        });
    </script>
</body>
</html>
