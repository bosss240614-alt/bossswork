<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart - Bosss'N'Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f5f9;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --primary: #2563eb;
      --accent: #f59e0b;
      --border: #e2e8f0;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      font-family: 'Inter', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(226, 232, 240, 0.9);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 20px;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      color: var(--primary);
    }

    .search-bar {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 400px;
      margin: 0 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }

    .search-bar button {
      padding: 8px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
    }

    .top-actions {
      display: flex;
      gap: 12px;
    }

    .top-actions button {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .top-actions button:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .cart-header h1 {
      margin: 0;
      font-size: 28px;
    }

    .cart-count {
      color: var(--muted);
      font-size: 16px;
    }

    .empty-cart {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-cart h2 {
      color: var(--muted);
      margin-bottom: 16px;
    }

    .empty-cart p {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .empty-cart .btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
    }

    .cart-item {
      display: flex;
      gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .item-image {
      width: 100px;
      height: 100px;
      background: var(--bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--muted);
    }

    .item-details {
      flex: 1;
    }

    .item-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .item-price {
      font-size: 16px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .item-quantity {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .quantity-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .quantity-input {
      width: 60px;
      text-align: center;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .remove-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .remove-btn:hover {
      background: #dc2626;
    }

    .cart-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-top: 32px;
      box-shadow: var(--shadow);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .summary-total {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .checkout-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.2s;
    }

    .checkout-btn:hover {
      background: #1d4ed8;
    }

    .continue-shopping {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }

    .continue-shopping:hover {
      background: var(--primary);
      color: white;
    }

    @media (max-width: 768px) {
      .cart-item {
        flex-direction: column;
      }

      .item-image {
        width: 100%;
        height: 80px;
      }

      .top-bar {
        flex-direction: column;
        gap: 16px;
      }

      .search-bar {
        max-width: none;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="top-bar">
      <div class="logo">Bosss'N'Store</div>
      <div class="search-bar">
        <input type="text" placeholder="Search for electronics, fashion, groceries..." />
        <button>Search</button>
      </div>
      <div class="top-actions">
        <button onclick="window.location.href='Bosss%27N%27Store.html'">All Categories</button>
        <button onclick="window.location.href='login.html'">Sign in</button>
        <button onclick="window.location.href='cart.html'">Cart (<span id="cart-count">0</span>)</button>
      </div>
    </div>
  </header>

  <main>
    <div class="cart-header">
      <h1>Shopping Cart</h1>
      <div class="cart-count" id="item-count">0 items</div>
    </div>

    <div id="cart-content">
      <!-- Cart items will be rendered here -->
    </div>

    <div id="cart-summary" style="display: none;">
      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="shipping">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax</span>
          <span id="tax">$0.00</span>
        </div>
        <div class="summary-row summary-total">
          <span>Total</span>
          <span id="total">$0.00</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
      </div>
    </div>

    <a href="Bosss'N'Store.html" class="continue-shopping">← Continue Shopping</a>
  </main>

  <script>
    // Sample cart data (in a real app, this would come from localStorage or a backend)
    let cart = JSON.parse(localStorage.getItem('cart')) || [
      {
        id: 1,
        name: 'Wireless Bluetooth Headphones',
        price: 89.99,
        quantity: 2,
        image: '🎧'
      },
      {
        id: 2,
        name: 'Smart Watch Series 5',
        price: 299.99,
        quantity: 1,
        image: '⌚'
      },
      {
        id: 3,
        name: 'Gaming Mouse RGB',
        price: 49.99,
        quantity: 1,
        image: '🖱️'
      }
    ];

    function renderCart() {
      const cartContent = document.getElementById('cart-content');
      const cartSummary = document.getElementById('cart-summary');
      const cartCount = document.getElementById('cart-count');
      const itemCount = document.getElementById('item-count');

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="empty-cart">
            <h2>Your cart is empty</h2>
            <p>Add some items to get started!</p>
            <a href="Bosss'N'Store.html" class="btn">Start Shopping</a>
          </div>
        `;
        cartSummary.style.display = 'none';
        cartCount.textContent = '0';
        itemCount.textContent = '0 items';
        return;
      }

      cartSummary.style.display = 'block';
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCount.textContent = totalItems;
      itemCount.textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;

      cartContent.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="item-image">${item.image}</div>
          <div class="item-details">
            <div class="item-name">${item.name}</div>
            <div class="item-price">$${item.price.toFixed(2)}</div>
            <div class="item-quantity">
              <button type="button" class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
              <input type="number" class="quantity-input" value="${item.quantity}" min="1" onchange="updateQuantity(${item.id}, parseInt(this.value))">
              <button type="button" class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
            </div>
            <button type="button" class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');

      updateSummary();
    }

    function updateQuantity(id, newQuantity) {
      if (newQuantity < 1) {
        removeItem(id);
        return;
      }

      const item = cart.find(item => item.id === id);
      if (item) {
        item.quantity = newQuantity;
        saveCart();
        renderCart();
      }
    }

    function removeItem(id) {
      cart = cart.filter(item => item.id !== id);
      saveCart();
      renderCart();
    }

    function updateSummary() {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = subtotal > 100 ? 0 : 9.99;
      const tax = subtotal * 0.08;
      const total = subtotal + shipping + tax;

      document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`;
      document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
      document.getElementById('total').textContent = `$${total.toFixed(2)}`;
    }

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function checkout() {
      if (cart.length === 0) {
        alert('Your cart is empty. Please add items before checking out.');
        return;
      }
      // Redirect to checkout page
      window.location.href = 'checkout.html';
    }

    // Initialize cart on page load
    renderCart();
  </script>
</body>
</html>
