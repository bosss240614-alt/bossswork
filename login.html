<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Bosss'N'Store</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --primary: #2563eb;
      --accent: #f59e0b;
      --border: #e2e8f0;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      font-family: 'Inter', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      padding: 32px 24px;
      text-align: center;
    }

    .login-header h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .login-header p {
      margin: 0;
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .login-form {
      padding: 32px 24px;
      display: grid;
      gap: 20px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }

    .form-group input {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: var(--primary);
    }

    .login-btn {
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: white;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background: #1d4ed8;
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .login-options a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .divider {
      margin: 24px 0;
      text-align: center;
      position: relative;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      background: var(--surface);
      padding: 0 12px;
      position: relative;
    }

    .social-login {
      display: grid;
      gap: 12px;
    }

    .social-btn {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 600;
      transition: border-color 0.3s;
    }

    .social-btn:hover {
      border-color: var(--primary);
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .signup-link a {
      color: var(--primary);
      font-weight: 600;
    }

    .footer {
      padding: 20px 24px;
      text-align: center;
      background: #f8fafc;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    @media(max-width: 480px) {
      .login-container {
        margin: 20px;
      }

      .login-header,
      .login-form {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <main class="login-container">
    <header class="login-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your Bosss'N'Store account</p>
    </header>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="login-btn">Sign In</button>

      <div class="login-options">
        <label>
          <input type="checkbox" id="rememberMe" /> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>
    </form>

    <div class="divider">
      <span>or continue with</span>
    </div>

    <div class="social-login">
      <button class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <button class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Continue with Facebook
      </button>
    </div>

    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>

    <div class="divider">
      <span>Admin Access</span>
    </div>

    <div class="admin-section" style="padding: 0 24px 24px;">
      <a href="admin.html" style="display: block; width: 100%;">
        <button type="button" class="login-btn" style="background: linear-gradient(135deg, #667eea, #764ba2); width: 100%;">
          Admin Login
        </button>
      </a>
    </div>
  </main>

  <div class="footer">
    <a href="Bosss'N'Store.html">Back to Store</a>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      // Mock login validation (in a real app, this would be server-side)
      if (email && password) {
        // Simulate successful login
        alert('Login successful! Redirecting to your account...');
        // In a real app, redirect to dashboard or home
        window.location.href = 'Bosss\'N\'Store.html';
      } else {
        alert('Please enter both email and password.');
      }
    });
  </script>
</body>
</html>
