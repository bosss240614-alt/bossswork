<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Clock</title>
  <style>
    :root {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(59,130,246,0.35), transparent 35%),
                  linear-gradient(180deg, #0f172a 0%, #1e3a8a 100%);
    }

    .clock-card {
      width: min(420px, 100%);
      padding: 40px 32px;
      border-radius: 32px;
      text-align: center;
      background: rgba(15, 23, 42, 0.88);
      box-shadow: 0 32px 80px rgba(15, 23, 42, 0.35);
      backdrop-filter: blur(10px);
    }

    .clock-title {
      margin: 0 0 20px;
      letter-spacing: 0.2em;
      font-size: 0.95rem;
      text-transform: uppercase;
      color: #93c5fd;
    }

    .time {
      font-size: clamp(3.5rem, 7vw, 6rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      margin: 0;
    }

    .date {
      margin: 14px 0 0;
      font-size: 1.1rem;
      color: #dbeafe;
      opacity: 0.85;
    }

    .footer {
      margin-top: 28px;
      color: #c7d2fe;
      font-size: 0.95rem;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <section class="clock-card">
    <p class="clock-title">Digital Clock</p>
    <h1 class="time" id="time">00:00:00</h1>
    <p class="date" id="date">Loading date...</p>
    <p class="footer">Built for practice. <a href="index.html">Back to home</a></p>
  </section>

  <script>
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');

    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const dayName = now.toLocaleDateString(undefined, { weekday: 'long' });
      const monthName = now.toLocaleDateString(undefined, { month: 'long' });
      const day = now.getDate();
      const year = now.getFullYear();

      timeEl.textContent = `${hours}:${minutes}:${seconds}`;
      dateEl.textContent = `${dayName}, ${monthName} ${day}, ${year}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
