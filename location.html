<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Finder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        #map {
            height: 400px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            background: #e0e0e0;
        }

        .info-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .info-card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .location-info {
            margin-bottom: 15px;
            padding: 12px;
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .location-info label {
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .location-info span {
            color: #333;
            font-size: 0.95em;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .coordinates-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .coordinates-display div {
            margin: 8px 0;
            font-size: 0.9em;
        }

        .accuracy-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .accuracy-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .weather-info {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border-left: 4px solid #0ea5e9;
        }

        .weather-info h3 {
            color: #0ea5e9;
            margin-bottom: 10px;
        }

        .weather-data {
            font-size: 0.9em;
            color: #333;
        }

        .weather-data div {
            margin: 5px 0;
        }

        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ Location Finder</h1>

        <div class="content">
            <!-- Map Section -->
            <div id="map"></div>

            <!-- Info Section -->
            <div class="info-card">
                <h2>📍 Your Location</h2>

                <div class="status" id="status">
                    Click "Get My Location" to start
                </div>

                <button onclick="getLocation()">Get My Location</button>
                <button onclick="watchLocation()">Watch Location (Live)</button>
                <button onclick="stopWatching()">Stop Watching</button>

                <div id="locationContent">
                    <div class="location-info">
                        <label>Latitude:</label>
                        <span id="latitude">-</span>
                    </div>

                    <div class="location-info">
                        <label>Longitude:</label>
                        <span id="longitude">-</span>
                    </div>

                    <div class="location-info">
                        <label>Accuracy:</label>
                        <span id="accuracy">-</span>
                    </div>

                    <div class="accuracy-bar">
                        <div class="accuracy-fill" id="accuracyBar" style="width: 0%"></div>
                    </div>

                    <div class="location-info">
                        <label>Altitude:</label>
                        <span id="altitude">-</span>
                    </div>

                    <div class="location-info">
                        <label>Speed:</label>
                        <span id="speed">-</span>
                    </div>

                    <div class="coordinates-display">
                        <strong>Full Coordinates:</strong>
                        <div id="fullCoordinates">Not available yet</div>
                    </div>
                </div>
            </div>

            <!-- Weather Section -->
            <div class="info-card full-width">
                <h2>🌤️ Location Information</h2>
                <div id="weatherInfo" class="weather-info" style="display: none;">
                    <h3>Weather Data</h3>
                    <div class="weather-data" id="weatherData"></div>
                </div>
                <div id="addressInfo" class="location-info">
                    <label>Address Info:</label>
                    <span id="address">Fetching address...</span>
                </div>
                <div id="timezoneInfo" class="location-info">
                    <label>Timezone:</label>
                    <span id="timezone">-</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let userMarker;
        let watchId;

        // Initialize map
        function initMap() {
            map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
        }

        // Get location once
        function getLocation() {
            if (!navigator.geolocation) {
                showStatus('Geolocation not supported by your browser', 'error');
                return;
            }

            showStatus('Getting your location...', 'loading');

            navigator.geolocation.getCurrentPosition(
                position => {
                    displayLocation(position.coords);
                    showStatus('Location found successfully!', 'success');
                },
                error => {
                    handleLocationError(error);
                }
            );
        }

        // Watch location continuously
        function watchLocation() {
            if (!navigator.geolocation) {
                showStatus('Geolocation not supported by your browser', 'error');
                return;
            }

            showStatus('Watching location...', 'loading');

            watchId = navigator.geolocation.watchPosition(
                position => {
                    displayLocation(position.coords);
                    showStatus('Location updated!', 'success');
                },
                error => {
                    handleLocationError(error);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                }
            );
        }

        // Stop watching location
        function stopWatching() {
            if (watchId !== undefined) {
                navigator.geolocation.clearWatch(watchId);
                showStatus('Stopped watching location', 'loading');
            }
        }

        // Display location data
        function displayLocation(coords) {
            const lat = coords.latitude.toFixed(6);
            const lon = coords.longitude.toFixed(6);
            const accuracy = coords.accuracy.toFixed(2);

            document.getElementById('latitude').textContent = lat;
            document.getElementById('longitude').textContent = lon;
            document.getElementById('accuracy').textContent = accuracy + ' meters';
            document.getElementById('altitude').textContent = coords.altitude ? coords.altitude.toFixed(2) + ' meters' : 'Not available';
            document.getElementById('speed').textContent = coords.speed ? (coords.speed * 3.6).toFixed(2) + ' km/h' : 'Stationary';

            document.getElementById('fullCoordinates').textContent = `${lat}, ${lon}`;

            // Update accuracy bar
            const accuracyPercent = Math.max(0, Math.min(100, 100 - (accuracy / 100)));
            document.getElementById('accuracyBar').style.width = accuracyPercent + '%';

            // Update map
            updateMap(lat, lon);

            // Fetch address
            fetchAddress(lat, lon);

            // Fetch timezone
            fetchTimezone(lat, lon);
        }

        // Update map with marker
        function updateMap(lat, lon) {
            const latlng = [lat, lon];

            if (userMarker) {
                userMarker.setLatLng(latlng);
            } else {
                userMarker = L.marker(latlng, {
                    icon: L.icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34],
                        shadowSize: [41, 41]
                    })
                }).addTo(map).bindPopup('Your Location<br>' + lat + ', ' + lon);
            }

            map.setView(latlng, 15);
        }

        // Fetch address from coordinates
        function fetchAddress(lat, lon) {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const address = data.address || {};
                    let addressText = '';

                    if (address.road) addressText += address.road + ', ';
                    if (address.village) addressText += address.village + ', ';
                    if (address.city) addressText += address.city + ', ';
                    if (address.county) addressText += address.county + ', ';
                    if (address.state) addressText += address.state + ', ';
                    if (address.country) addressText += address.country;

                    document.getElementById('address').textContent = addressText || 'Address not found';
                })
                .catch(error => {
                    console.log('Could not fetch address:', error);
                    document.getElementById('address').textContent = 'Could not fetch address';
                });
        }

        // Fetch timezone
        function fetchTimezone(lat, lon) {
            const url = `https://timeapi.io/api/timezone/coordinate?latitude=${lat}&longitude=${lon}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.timezone) {
                        document.getElementById('timezone').textContent = data.timezone;
                    }
                })
                .catch(error => {
                    console.log('Could not fetch timezone:', error);
                    document.getElementById('timezone').textContent = 'Not available';
                });
        }

        // Show status messages
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        // Handle location errors
        function handleLocationError(error) {
            let message = '';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = 'Permission denied. Please enable location access.';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = 'Location information unavailable.';
                    break;
                case error.TIMEOUT:
                    message = 'Location request timed out.';
                    break;
                default:
                    message = 'An error occurred while getting your location.';
            }
            showStatus(message, 'error');
        }

        // Initialize on page load
        window.addEventListener('load', initMap);
    </script>
</body>
</html>
