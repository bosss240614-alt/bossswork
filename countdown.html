<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Religious & Celebration Countdown</title>
  <style>
    :root {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 95%);
      color: #e2e8f0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: min(960px, 100%);
      background: rgba(15, 23, 42, 0.95);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
    }

    header {
      padding: 32px 28px 22px;
      background: linear-gradient(90deg, #0ea5e9, #8b5cf6);
      color: white;
      text-align: center;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.03em;
    }

    header p {
      margin: 0;
      font-size: 1rem;
      opacity: 0.92;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 28px;
    }

    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 22px;
      padding: 22px;
      display: grid;
      gap: 14px;
      min-height: 200px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.25rem;
      color: #f8fafc;
    }

    .card p {
      margin: 0;
      line-height: 1.5;
      color: #cbd5e1;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .countdown div {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px 12px;
      text-align: center;
    }

    .countdown strong {
      display: block;
      font-size: 1.5rem;
      color: #f8fafc;
    }

    .countdown span {
      display: block;
      margin-top: 6px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
    }

    .footer {
      padding: 18px 28px 28px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.96rem;
    }

    .footer a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Upcoming Celebration & Religious Days</h1>
      <p>Countdown to the next major religious and international celebrations throughout the year.</p>
    </header>

    <section class="grid" id="eventGrid"></section>

    <div class="footer">
      Times are based on your device clock. <a href="index.html">Back to home</a>
    </div>
  </main>

  <script>
    const events = [
      { name: "New Year's Day", date: { month: 1, day: 1 }, description: "Celebrates the start of the new year." },
      { name: "Naw-Rúz", date: { month: 3, day: 21 }, description: "Baha'i New Year and spring renewal." },
      { name: "Holi", date: { type: 'lookup', calendar: 'holi' }, description: "Hindu festival of colors." },
      { name: "Ramadan Start", date: { type: 'lookup', calendar: 'ramadanStart' }, description: "The beginning of the Islamic fasting month." },
      { name: "Eid al-Fitr", date: { type: 'lookup', calendar: 'eidAlFitr' }, description: "Celebration marking the end of Ramadan." },
      { name: "Eid al-Adha", date: { type: 'lookup', calendar: 'eidAlAdha' }, description: "Islamic festival of sacrifice." },
      { name: "Vaisakhi", date: { month: 4, day: 13 }, description: "Sikh New Year festival." },
      { name: "Good Friday", date: { type: 'calc', calendar: 'goodFriday' }, description: "Christian day of reflection before Easter." },
      { name: "Easter Sunday", date: { type: 'calc', calendar: 'easter' }, description: "Christian celebration of resurrection." },
      { name: "Rosh Hashanah", date: { type: 'lookup', calendar: 'roshHashanah' }, description: "Jewish New Year." },
      { name: "Yom Kippur", date: { type: 'lookup', calendar: 'yomKippur' }, description: "Jewish Day of Atonement." },
      { name: "Diwali", date: { type: 'lookup', calendar: 'diwali' }, description: "Hindu festival of lights." },
      { name: "Vesak", date: { type: 'lookup', calendar: 'vesak' }, description: "Buddhist celebration of Buddha's birth and enlightenment." },
      { name: "Hanukkah", date: { type: 'lookup', calendar: 'hanukkah' }, description: "Jewish Festival of Lights." },
      { name: "Christmas", date: { month: 12, day: 25 }, description: "Christian celebration of Jesus' birth." }
    ];

    const holidayLookups = {
      holi: {
        2024: { month: 3, day: 25 },
        2025: { month: 3, day: 14 },
        2026: { month: 3, day: 3 },
        2027: { month: 3, day: 22 },
        2028: { month: 3, day: 10 }
      },
      ramadanStart: {
        2024: { month: 3, day: 10 },
        2025: { month: 2, day: 28 },
        2026: { month: 2, day: 18 },
        2027: { month: 2, day: 7 },
        2028: { month: 1, day: 27 }
      },
      eidAlFitr: {
        2024: { month: 4, day: 10 },
        2025: { month: 3, day: 31 },
        2026: { month: 3, day: 21 },
        2027: { month: 3, day: 10 },
        2028: { month: 3, day: 29 }
      },
      eidAlAdha: {
        2024: { month: 6, day: 16 },
        2025: { month: 6, day: 6 },
        2026: { month: 5, day: 26 },
        2027: { month: 6, day: 15 },
        2028: { month: 6, day: 4 }
      },
      roshHashanah: {
        2024: { month: 10, day: 3 },
        2025: { month: 9, day: 23 },
        2026: { month: 9, day: 12 },
        2027: { month: 10, day: 1 },
        2028: { month: 9, day: 20 }
      },
      yomKippur: {
        2024: { month: 10, day: 12 },
        2025: { month: 10, day: 2 },
        2026: { month: 9, day: 22 },
        2027: { month: 10, day: 11 },
        2028: { month: 9, day: 30 }
      },
      hanukkah: {
        2024: { month: 12, day: 26 },
        2025: { month: 12, day: 14 },
        2026: { month: 12, day: 4 },
        2027: { month: 12, day: 24 },
        2028: { month: 12, day: 12 }
      },
      vesak: {
        2024: { month: 5, day: 23 },
        2025: { month: 5, day: 12 },
        2026: { month: 5, day: 1 },
        2027: { month: 5, day: 21 },
        2028: { month: 5, day: 10 }
      },
      diwali: {
        2024: { month: 11, day: 1 },
        2025: { month: 10, day: 20 },
        2026: { month: 11, day: 9 },
        2027: { month: 10, day: 30 },
        2028: { month: 11, day: 17 }
      }
    };

    function getHolidayDate(event, referenceYear) {
      const dateInfo = event.date;
      if (dateInfo.type === 'calc') {
        if (dateInfo.calendar === 'easter') {
          return getEasterDate(referenceYear);
        }
        if (dateInfo.calendar === 'goodFriday') {
          const easter = getEasterDate(referenceYear);
          return new Date(easter.getTime() - 2 * 24 * 60 * 60 * 1000);
        }
      }

      if (dateInfo.type === 'lookup') {
        const lookup = holidayLookups[dateInfo.calendar];
        if (lookup && lookup[referenceYear]) {
          return new Date(referenceYear, lookup[referenceYear].month - 1, lookup[referenceYear].day, 0, 0, 0, 0);
        }
        const lastYear = Math.max(...Object.keys(lookup || {}).map(Number));
        const fallback = lookup[lastYear];
        return new Date(referenceYear, fallback.month - 1, fallback.day, 0, 0, 0, 0);
      }

      return new Date(referenceYear, dateInfo.month - 1, dateInfo.day, 0, 0, 0, 0);
    }

    function getEasterDate(year) {
      const a = year % 19;
      const b = Math.floor(year / 100);
      const c = year % 100;
      const d = Math.floor(b / 4);
      const e = b % 4;
      const f = Math.floor((b + 8) / 25);
      const g = Math.floor((b - f + 1) / 3);
      const h = (19 * a + b - d - g + 15) % 30;
      const i = Math.floor(c / 4);
      const k = c % 4;
      const l = (32 + 2 * e + 2 * i - h - k) % 7;
      const m = Math.floor((a + 11 * h + 22 * l) / 451);
      const month = Math.floor((h + l - 7 * m + 114) / 31);
      const day = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(year, month - 1, day, 0, 0, 0, 0);
    }

    function getNextOccurrence(event) {
      const now = new Date();
      let target = getHolidayDate(event, now.getFullYear());
      if (target < now) {
        target = getHolidayDate(event, now.getFullYear() + 1);
      }
      return target;
    }

    function formatCountdown(milliseconds) {
      const totalSeconds = Math.max(Math.floor(milliseconds / 1000), 0);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return { days, hours, minutes, seconds };
    }

    function renderCards() {
      const grid = document.getElementById('eventGrid');
      const now = new Date();
      const sortedEvents = events.map(event => {
        const target = getNextOccurrence(event);
        const diff = target - now;
        return { ...event, target, diff };
      }).sort((a, b) => a.diff - b.diff);

      grid.innerHTML = sortedEvents.map(event => {
        const countdown = formatCountdown(event.diff);
        const dateLabel = event.target.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        return `
          <article class="card">
            <h2>${event.name}</h2>
            <p>${event.description}</p>
            <p><strong>Next:</strong> ${dateLabel}</p>
            <div class="countdown">
              <div><strong>${countdown.days}</strong><span>Days</span></div>
              <div><strong>${String(countdown.hours).padStart(2, '0')}</strong><span>Hours</span></div>
              <div><strong>${String(countdown.minutes).padStart(2, '0')}</strong><span>Minutes</span></div>
              <div><strong>${String(countdown.seconds).padStart(2, '0')}</strong><span>Seconds</span></div>
            </div>
          </article>
        `;
      }).join('');
    }

    renderCards();
    setInterval(renderCards, 1000);
  </script>
</body>
</html>
