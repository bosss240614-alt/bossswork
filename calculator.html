<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      color: #1f2937;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .calculator {
      width: min(360px, 100%);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
      overflow: hidden;
    }

    .display {
      background: linear-gradient(180deg, #4f46e5, #2563eb);
      color: white;
      padding: 28px 24px;
      text-align: right;
      font-size: 2.5rem;
      letter-spacing: 0.04em;
      word-wrap: break-word;
      min-height: 110px;
    }

    .display .history {
      font-size: 0.95rem;
      opacity: 0.75;
      line-height: 1.3;
      margin-bottom: 10px;
      min-height: 24px;
    }

    .display .current {
      display: block;
      word-break: break-all;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 20px;
      background: #f8fafc;
    }

    button {
      border: none;
      border-radius: 16px;
      min-height: 64px;
      font-size: 1.25rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .button-operator {
      background: #2563eb;
      color: white;
    }

    .button-number {
      background: #e2e8f0;
      color: #111827;
    }

    .button-action {
      background: #f97316;
      color: white;
    }

    .button-zero {
      grid-column: span 2;
    }

    .footer {
      text-align: center;
      padding: 14px 0 18px;
      color: #6b7280;
      font-size: 0.95rem;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <section class="calculator">
    <div class="display">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="keys">
      <button class="button-action" data-action="clear">C</button>
      <button class="button-action" data-action="delete">DEL</button>
      <button class="button-operator" data-value="%">%</button>
      <button class="button-operator" data-value="/">÷</button>

      <button class="button-number" data-value="7">7</button>
      <button class="button-number" data-value="8">8</button>
      <button class="button-number" data-value="9">9</button>
      <button class="button-operator" data-value="*">×</button>

      <button class="button-number" data-value="4">4</button>
      <button class="button-number" data-value="5">5</button>
      <button class="button-number" data-value="6">6</button>
      <button class="button-operator" data-value="-">−</button>

      <button class="button-number" data-value="1">1</button>
      <button class="button-number" data-value="2">2</button>
      <button class="button-number" data-value="3">3</button>
      <button class="button-operator" data-value="+">+</button>

      <button class="button-number button-zero" data-value="0">0</button>
      <button class="button-number" data-value=".">.</button>
      <button class="button-action" data-action="equals">=</button>
    </div>
  </section>
  <div class="footer">
    Built for practice. <a href="index.html">Back to home</a>
  </div>

  <script>
    const historyEl = document.getElementById('history');
    const currentEl = document.getElementById('current');
    const buttons = document.querySelectorAll('button');

    let currentValue = '0';
    let expression = '';

    function updateDisplay() {
      currentEl.textContent = currentValue;
      historyEl.textContent = expression;
    }

    function appendNumber(number) {
      if (currentValue === '0' && number !== '.') {
        currentValue = number;
        return;
      }
      if (number === '.' && currentValue.includes('.')) return;
      currentValue += number;
    }

    function appendOperator(operator) {
      if (expression.endsWith(' ') && currentValue === '') {
        expression = expression.slice(0, -3) + ` ${operator} `;
        return;
      }
      expression += currentValue + ` ${operator} `;
      currentValue = '';
    }

    function clearAll() {
      currentValue = '0';
      expression = '';
    }

    function deleteLast() {
      if (currentValue.length > 1) {
        currentValue = currentValue.slice(0, -1);
      } else {
        currentValue = '0';
      }
    }

    function calculate() {
      if (!expression && currentValue === '0') return;
      let expr = expression + currentValue;
      expr = expr.replace(/×/g, '*').replace(/÷/g, '/');
      try {
        const result = Function(`'use strict'; return (${expr})`)();
        currentValue = String(result);
        expression = '';
      } catch (error) {
        currentValue = 'Error';
      }
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const action = button.dataset.action;
        const value = button.dataset.value;

        if (action === 'clear') {
          clearAll();
        } else if (action === 'delete') {
          deleteLast();
        } else if (action === 'equals') {
          calculate();
        } else if (button.classList.contains('button-operator')) {
          appendOperator(value);
          currentValue = '';
        } else {
          appendNumber(value);
        }

        updateDisplay();
      });
    });

    updateDisplay();
  </script>
</body>
</html>
